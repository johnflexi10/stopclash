<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STOP! Clash - Multiplayer</title>
  <!-- Google Fonts: Outfit for titles, Inter for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Jogue Stop! (Adedonha) online com 1 a 15 amigos. Leve, rápido e com power-ups eletrizantes!">
</head>
<body>
  <!-- Header Bar with connection status -->
  <header class="app-header">
    <div class="header-logo">
      STOP! <span class="neon-pink-text">CLASH</span>
    </div>
    <div id="connection-status" class="status-indicator" title="Modo Solo / Não Conectado"></div>
  </header>

  <!-- Main Game view holder -->
  <main id="game-container" class="main-content">
    <!-- Game view rendered dynamically here -->
    <div class="loading-spinner">Carregando o Universo do Jogo...</div>
  </main>

  <!-- MQTT client -->
  <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <!-- Game scripts -->
  <script src="js/words.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
